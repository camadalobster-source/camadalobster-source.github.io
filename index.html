<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Henry Chen</title>
    <meta name="description" content="工具集" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
        color: #0f172a;
        background:
          radial-gradient(1200px 600px at 50% -10%, #e0ecff 0%, rgba(224,236,255,0) 60%),
          #f6f8fc;
        min-height: 100vh;
      }
      .wrap { max-width: 860px; margin: 0 auto; padding: 96px 24px 96px; }
      header { text-align: center; margin-bottom: 56px; }
      .mark {
        font-size: 2.4rem; font-weight: 700; letter-spacing: -0.02em;
        background: linear-gradient(135deg, #1e3a8a, #3b82f6);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      header .sub { margin-top: 10px; color: #94a3b8; font-size: .9rem; letter-spacing: .35em; text-transform: uppercase; }

      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
      .card {
        position: relative;
        display: flex; flex-direction: column;
        text-decoration: none; color: inherit;
        background: rgba(255,255,255,.8);
        backdrop-filter: blur(8px);
        border: 1px solid #e6ebf3;
        border-radius: 18px;
        padding: 24px;
        min-height: 150px;
        transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      }
      .card:hover { transform: translateY(-3px); border-color: #bcd2ff; box-shadow: 0 14px 34px rgba(30,58,138,.12); }
      .icon {
        width: 44px; height: 44px; border-radius: 12px;
        display: grid; place-items: center; font-size: 1.4rem;
        background: linear-gradient(135deg, #eff4ff, #dbe7ff);
        margin-bottom: 16px;
      }
      .card h3 { font-size: 1.15rem; font-weight: 650; }
      .card .role { margin-top: 4px; color: #64748b; font-size: .9rem; }
      .card .go { margin-top: auto; padding-top: 16px; color: #2563eb; font-size: .85rem; font-weight: 600; }
      .card .go::after { content: " →"; transition: margin-left .18s ease; }
      .card:hover .go::after { margin-left: 4px; }

      @media (prefers-color-scheme: dark) {
        body { color: #e2e8f0; background: radial-gradient(1200px 600px at 50% -10%, #16244a 0%, rgba(22,36,74,0) 60%), #0b1120; }
        .mark { background: linear-gradient(135deg, #93c5fd, #60a5fa); -webkit-background-clip: text; background-clip: text; }
        .card { background: rgba(30,41,59,.6); border-color: #25324a; }
        .card:hover { border-color: #3b5687; }
        .icon { background: linear-gradient(135deg, #1e293b, #283a5e); }
        .card .role { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="mark">Henry Chen</div>
        <div class="sub">工具集</div>
      </header>

      <main class="grid">
        <!-- 新工具：複製一張 card 改 href / icon / 名稱 / role 即可 -->
        <a class="card" href="https://camadalobster-source.github.io/work-hub/">
          <div class="icon">🗂️</div>
          <h3>work-hub</h3>
          <div class="role">工作待辦指揮中心</div>
          <div class="go">開啟</div>
        </a>
        <a class="card" href="https://camadalobster-source.github.io/tools-image/">
          <div class="icon">🖼️</div>
          <h3>圖片調整</h3>
          <div class="role">Gemini 圖片處理</div>
          <div class="go">開啟</div>
        </a>
        <a class="card" href="https://camadalobster-source.github.io/tools/native-ad-customizer.html">
          <div class="icon">📐</div>
          <h3>Native Ad 調整器</h3>
          <div class="role">原生廣告樣式 · 匯出</div>
          <div class="go">開啟</div>
        </a>
      </main>
    </div>
  </body>
</html>
